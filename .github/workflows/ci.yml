name: CI

# Validate pull requests before they are merged into main.
# Deploys are handled separately by deploy.yml (on push to main).
on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
